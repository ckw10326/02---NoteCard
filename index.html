<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽球技術卡 · 合集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        /* 頂部主題切換 */
        .theme-switch {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 200;
            background: rgba(0,0,0,0.8);
            padding: 6px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .theme-btn {
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: transparent;
            color: white;
            opacity: 0.5;
            font-family: inherit;
        }
        .theme-btn.active { background: white; color: black; opacity: 1; }

        .wallpaper-container {
            width: 375px;
            height: 812px;
            margin: 20px 0;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border: 4px solid #333;
        }
        .gradient-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 10;
        }
        .content {
            position: relative;
            z-index: 20;
            padding: 84px 24px 60px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .number-bg {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 120px;
            font-weight: 900;
            opacity: 0.1;
            line-height: 1;
        }
        .title-section { margin-bottom: 28px; }
        .main-title {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1px;
            line-height: 1.2;
        }
        .sub-title {
            font-size: 18px;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 8px;
            border-left: 4px solid currentColor;
            padding-left: 12px;
        }
        .chain-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 24px;
            font-size: 13px;
            font-weight: 700;
            opacity: 0.85;
        }
        .chain-bar .node {
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .chain-bar .node.on { background: currentColor; }
        .chain-bar .node.on span { color: #111; }
        .chain-bar .arr { opacity: 0.5; }
        .rule-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .rule-tag {
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .rule-text { font-size: 17px; font-weight: 700; line-height: 1.5; }
        .rule-desc { font-size: 14px; font-weight: 400; opacity: 0.7; margin-top: 4px; }
        .footer-note {
            margin-top: auto;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            opacity: 0.5;
        }

        /* ===== 主題一：技術修正 配色 ===== */
        .card-defense { background: #0f172a; }
        .card-defense .accent { color: #38bdf8; }
        .card-defense .rule-tag { background: #38bdf8; color: #0f172a; }
        .card-net { background: #064e3b; }
        .card-net .accent { color: #4ade80; }
        .card-net .rule-tag { background: #4ade80; color: #064e3b; }
        .card-attack { background: #450a0a; }
        .card-attack .accent { color: #f87171; }
        .card-attack .rule-tag { background: #f87171; color: #450a0a; }

        /* ===== 主題二：力量傳遞 配色 ===== */
        .card-drive { background: #2a1207; }
        .card-drive .accent { color: #ff8a4c; }
        .card-drive .rule-tag { background: #ff8a4c; color: #2a1207; }
        .card-rotate { background: #07262a; }
        .card-rotate .accent { color: #3ad6c4; }
        .card-rotate .rule-tag { background: #3ad6c4; color: #07262a; }
        .card-snap { background: #3a0d12; }
        .card-snap .accent { color: #f87171; }
        .card-snap .rule-tag { background: #f87171; color: #3a0d12; }

        /* 底部卡片切換 */
        .nav-buttons {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        .nav-btn {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: transparent;
            color: white;
            opacity: 0.5;
            font-family: inherit;
        }
        .nav-btn.active { background: white; color: black; opacity: 1; }

        @media (max-width: 400px) {
            .wallpaper-container {
                width: 100vw;
                height: 100vh;
                margin: 0;
                border: none;
                border-radius: 0;
            }
            .nav-buttons { bottom: 40px; }
        }
    </style>
</head>
<body>

    <!-- 頂部：主題切換（由 JS 渲染） -->
    <div class="theme-switch" id="themeSwitch"></div>

    <!-- 卡片區（由 JS 渲染） -->
    <div id="cardContainer"></div>

    <!-- 底部：卡片切換（由 JS 渲染） -->
    <div class="nav-buttons" id="navButtons"></div>

    <script>
        // ─── 卡片資料 ────────────────────────────────────────────────
        const CARD_DATA = {
            tech: {
                label: '技術修正',
                cards: [
                    {
                        navLabel: '防禦',
                        colorClass: 'card-defense',
                        title: '防禦接殺卡',
                        subtitle: '穩如泰山，借力反擊',
                        rules: [
                            { tag: 'Rhythm',  text: '節奏同步：咚(殺)－咚(防)', desc: '聽球聲對準同步律，不要搶拍也不要慢。' },
                            { tag: 'Posture', text: '動態重心：拒絕死蹲',       desc: '腳跟微浮，保持隨時向前的推力與彈性。' },
                            { tag: 'Counter', text: '回抽心法：借力推擋',       desc: '不發蠻力；球低則仰角調整，平推送過網。' },
                            { tag: 'Lift',    text: '回挑加力：額外引導',       desc: '借不到力時，手腕與小臂必須額外向上引導。' },
                        ]
                    },
                    {
                        navLabel: '網前',
                        colorClass: 'card-net',
                        title: '搓撥撲網卡',
                        subtitle: '搶佔高點，先發制人',
                        rules: [
                            { tag: 'Timing',   text: '黃金二拍：觸球即撲',         desc: '對手觸球「一」，高點撲擊「二」。瞬息萬變。' },
                            { tag: 'Position', text: '侵略站位：發球即進',         desc: '腳步即刻前踏，拍子前伸，極大化攔截區。' },
                            { tag: 'Mindset',  text: '關鍵意識：網前是搶下來的', desc: '不要等球過來，要在球過網前主動迎擊。' },
                        ]
                    },
                    {
                        navLabel: '連貫',
                        colorClass: 'card-attack',
                        title: '殺球連貫卡',
                        subtitle: '節奏壓制，心靈獵殺',
                        rules: [
                            { tag: 'Flow',    text: '連貫壓迫：嚴格執行循環', desc: '用穩定的「殺－防」頻率徹底摧毀對方防線。' },
                            { tag: 'Tactics', text: '心理博弈：獵殺紊亂',   desc: '對方節奏不對時，閉眼憑直覺「抓」住空檔。' },
                            { tag: 'Focus',   text: '致命威脅：節奏大於力量', desc: '節奏對了普通殺球也致命；亂了重殺也是浪費。' },
                        ]
                    }
                ]
            },
            power: {
                label: '力量傳遞',
                cards: [
                    {
                        navLabel: '發力',
                        colorClass: 'card-drive',
                        title: '單腳發力卡',
                        subtitle: '腳帶身體，重心先動',
                        chain: { nodes: ['腳', '髖', '軀幹', '手'], active: [0] },
                        rules: [
                            { tag: 'Motion', text: '單腳橫向一跳', desc: '以單腳做橫向的一次跳躍，模擬殺球瞬間身體被帶動的軌跡，不是手在動，是腳在推。' },
                            { tag: 'Feel',   text: '感受腳部發力', desc: '蹬地瞬間去感覺力量從腳掌出來，沿著腿往上傳，帶著重心往側邊移過去。' },
                            { tag: 'Check',  text: '腳是力量起點', desc: '確認移動是從腳的蹬伸出發、再帶動重心，不是只靠上半身硬撐——根穩了，後面的力才接得上。' },
                        ]
                    },
                    {
                        navLabel: '轉身',
                        colorClass: 'card-rotate',
                        title: '轉身跳越卡',
                        subtitle: '擊球瞬間，身體轉正',
                        chain: { nodes: ['腳', '髖', '軀幹', '手'], active: [1, 2] },
                        rules: [
                            { tag: 'Add-on', text: '加入轉身移動', desc: '卡片一的橫跳順暢後，把跳躍加上轉身，讓腳的發力同時帶動髖與軀幹一起旋轉。' },
                            { tag: 'Key',    text: '擊球瞬間轉正', desc: '要領是擊球那一刻身體剛好轉成正面朝前——轉體在空中、擊球當下完成，落地只是收勢，不是落地才喬。' },
                            { tag: 'Chain',  text: '力量不中斷',   desc: '腳→髖→軀幹的旋轉要連續，轉身只是把橫向的力導成出拍的力，過程中不停頓。' },
                        ]
                    },
                    {
                        navLabel: '收尾',
                        colorClass: 'card-snap',
                        title: '手臂收尾卡',
                        subtitle: '力到手指，鞭打出球',
                        chain: { nodes: ['腳', '髖', '軀幹', '手'], active: [3] },
                        rules: [
                            { tag: 'Relay', text: '大臂帶小臂',   desc: '接續卡片二轉正的軀幹力量，由大臂先甩出、再帶動小臂，力量一棒接一棒往末端送，手臂全程放鬆不僵。' },
                            { tag: 'Whip',  text: '小臂內旋鞭打', desc: '擊球瞬間小臂快速內旋（旋前），像甩鞭子一樣把速度集中到拍頭，這是整條力量鏈的加速段。' },
                            { tag: 'Snap',  text: '手指最後扣壓', desc: '觸球那一刻手指瞬間握緊扣壓，把傳上來的力一次釋放——手指是出口，鬆握到緊握的落差就是球速。' },
                        ]
                    }
                ]
            }
        };

        // ─── 狀態 ────────────────────────────────────────────────────
        let currentTheme = 'tech';
        let currentCardIndex = 0;

        // ─── HTML 產生器 ─────────────────────────────────────────────
        function buildChainBar(chain) {
            return chain.nodes.map((label, i) => {
                const isOn = chain.active.includes(i);
                const node = isOn
                    ? `<span class="node on"><span>${label}</span></span>`
                    : `<span class="node">${label}</span>`;
                return i < chain.nodes.length - 1 ? node + '<span class="arr">›</span>' : node;
            }).join('');
        }

        function buildCard(card, index, themeKey, visible) {
            const num = String(index + 1).padStart(2, '0');
            const chainHTML = card.chain
                ? `<div class="chain-bar accent">${buildChainBar(card.chain)}</div>`
                : '';
            const rulesHTML = card.rules.map(r => `
                <div class="rule-card">
                    <div class="rule-tag">${r.tag}</div>
                    <div class="rule-text">${r.text}</div>
                    <div class="rule-desc">${r.desc}</div>
                </div>`).join('');

            return `
                <div id="${themeKey}-${index}"
                     class="wallpaper-container ${card.colorClass}${visible ? '' : ' hidden'}">
                    <div class="number-bg">${num}</div>
                    <div class="gradient-overlay"></div>
                    <div class="content">
                        <div class="title-section">
                            <div class="main-title accent">${card.title}</div>
                            <div class="sub-title">${card.subtitle}</div>
                        </div>
                        ${chainHTML}
                        ${rulesHTML}
                        <div class="footer-note accent">BADMINTON ELITE ADVISOR</div>
                    </div>
                </div>`;
        }

        // ─── 渲染 ────────────────────────────────────────────────────
        function renderThemeSwitch() {
            const el = document.getElementById('themeSwitch');
            el.innerHTML = Object.entries(CARD_DATA).map(([key, theme]) => `
                <button class="theme-btn${key === currentTheme ? ' active' : ''}"
                        onclick="showTheme('${key}', this)"
                        aria-label="${theme.label}主題">
                    ${theme.label}
                </button>`).join('');
        }

        function renderCards() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = Object.entries(CARD_DATA).map(([themeKey, theme]) => {
                const isCurrentTheme = themeKey === currentTheme;
                const cardsHTML = theme.cards.map((card, i) =>
                    buildCard(card, i, themeKey, isCurrentTheme && i === currentCardIndex)
                ).join('');
                return `<div class="theme-group${isCurrentTheme ? '' : ' hidden'}" data-theme="${themeKey}">${cardsHTML}</div>`;
            }).join('');
        }

        function renderNav() {
            const theme = CARD_DATA[currentTheme];
            const nav = document.getElementById('navButtons');
            nav.innerHTML = theme.cards.map((card, i) => `
                <button class="nav-btn${i === currentCardIndex ? ' active' : ''}"
                        onclick="showCard(${i})"
                        aria-label="第${i + 1}張卡：${card.navLabel}">
                    ${card.navLabel}
                </button>`).join('');
        }

        // ─── 互動處理 ────────────────────────────────────────────────
        function showCard(index) {
            currentCardIndex = index;
            document.querySelectorAll(`.theme-group[data-theme="${currentTheme}"] .wallpaper-container`)
                .forEach((el, i) => el.classList.toggle('hidden', i !== index));
            renderNav();
        }

        function showTheme(themeKey, btn) {
            currentTheme = themeKey;
            currentCardIndex = 0;

            document.querySelectorAll('.theme-group')
                .forEach(g => g.classList.toggle('hidden', g.dataset.theme !== themeKey));
            document.querySelectorAll(`.theme-group[data-theme="${themeKey}"] .wallpaper-container`)
                .forEach((el, i) => el.classList.toggle('hidden', i !== 0));

            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            renderNav();
        }

        // ─── 鍵盤導航 ────────────────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            const cards = CARD_DATA[currentTheme].cards;
            if (e.key === 'ArrowRight' && currentCardIndex < cards.length - 1) showCard(currentCardIndex + 1);
            if (e.key === 'ArrowLeft'  && currentCardIndex > 0)                showCard(currentCardIndex - 1);
        });

        // ─── 初始化 ──────────────────────────────────────────────────
        renderThemeSwitch();
        renderCards();
        renderNav();
    </script>
</body>
</html>
