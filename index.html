<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM 中轉站 - 私人版 v1.3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .message { max-width: 85%; }
    .chat-container { scrollbar-width: thin; scrollbar-color: #4b5563 #1f2937; }
  </style>
</head>
<body class="bg-gray-950 text-gray-200 flex h-screen overflow-hidden">
  <!-- 左側設定面板 -->
  <div class="w-80 bg-gray-900 border-r border-gray-700 flex flex-col">
    <div class="p-6 border-b border-gray-700">
      <h1 class="text-3xl font-bold text-white flex items-center gap-3">
        <i class="fas fa-robot"></i> LLM 中轉站
      </h1>
      <p class="text-xs text-emerald-400 mt-1">v1.3 - 2026-02-26 15:30 CST • 已修正 Kimi URL & CORS 提示</p>
    </div>

    <div class="p-6 flex-1 flex flex-col gap-6">
      <!-- API 選擇 -->
      <div>
        <label class="block text-sm font-medium mb-2">選擇 API</label>
        <select id="apiSelect" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white">
          <option value="deepseek">DeepSeek (5M 免費)</option>
          <option value="grok">Grok (xAI)</option>
          <option value="kimi" selected>Kimi (已充值 $5 • .cn)</option>
        </select>
      </div>

      <!-- Kimi Region -->
      <div id="kimiRegionGroup">
        <label class="block text-sm font-medium mb-2">Kimi Region（已預設 .cn）</label>
        <select id="kimiRegion" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white">
          <option value="cn" selected>Domestic (.cn) - 你註冊平台</option>
          <option value="ai">International (.ai)</option>
        </select>
      </div>

      <!-- API Key -->
      <div>
        <label class="block text-sm font-medium mb-2">API Key</label>
        <input id="apiKey" type="password" placeholder="sk-..." 
               class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white">
        <button onclick="saveKey()" 
                class="mt-3 w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-lg font-medium flex items-center justify-center gap-2">
          <i class="fas fa-save"></i> 儲存 Key
        </button>
      </div>

      <div class="flex gap-3">
        <button onclick="clearChat()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-lg font-medium">🗑️ 清空對話</button>
        <button onclick="exportChat()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-lg font-medium">📤 匯出對話</button>
      </div>
    </div>

    <div class="p-6 text-xs text-gray-500 border-t border-gray-700">
      私人測試版 • 每次更新都會顯示版本時間
    </div>
  </div>

  <!-- 右側聊天區域 -->
  <div class="flex-1 flex flex-col">
    <div class="bg-gray-900 border-b border-gray-700 px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span id="currentAPI" class="font-semibold text-lg text-emerald-400">Kimi (.cn) 已啟用</span>
      </div>
      <div class="text-sm text-gray-400">記憶功能已開啟</div>
    </div>

    <div id="chat" class="flex-1 p-6 overflow-y-auto chat-container bg-gray-950 space-y-6"></div>

    <div class="bg-gray-900 border-t border-gray-700 p-6">
      <div class="flex gap-3">
        <textarea id="userInput" rows="1" class="flex-1 bg-gray-800 border border-gray-600 rounded-2xl px-6 py-4 resize-none focus:outline-none focus:border-emerald-500 max-h-40"
                  placeholder="輸入訊息... (Enter 送出)"></textarea>
        <button onclick="sendMessage()" class="bg-emerald-600 hover:bg-emerald-500 w-16 h-16 rounded-2xl flex items-center justify-center text-2xl transition">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
      <div class="text-center text-xs text-gray-500 mt-3">v1.3 • 詳細錯誤診斷</div>
    </div>
  </div>
</body>
<script>
// ==================== 配置 v1.3 ====================
const API_CONFIGS = {
  deepseek: { name: "DeepSeek", baseURL: "https://api.deepseek.com", endpoint: "/chat/completions", model: "deepseek-chat" },
  grok: { name: "Grok", baseURL: "https://api.x.ai/v1", endpoint: "/chat/completions", model: "grok-beta" },
  kimi: { name: "Kimi", endpoint: "/chat/completions", model: "kimi-k2.5" }
};

let currentAPI = 'kimi';
let messages = [];
let isStreaming = false;
let kimiRegion = 'cn';  // 預設 .cn

// ==================== 載入 ====================
function loadSettings() {
  currentAPI = localStorage.getItem('currentAPI') || 'kimi';
  document.getElementById('apiSelect').value = currentAPI;

  kimiRegion = localStorage.getItem('kimiRegion') || 'cn';
  document.getElementById('kimiRegion').value = kimiRegion;

  updateCurrentAPI();
  toggleKimiRegion();

  const savedKey = localStorage.getItem(`apiKey_${currentAPI}`);
  if (savedKey) document.getElementById('apiKey').value = savedKey;

  const savedMessages = localStorage.getItem('chatMessages');
  if (savedMessages) {
    messages = JSON.parse(savedMessages);
    renderMessages();
  }
}

function toggleKimiRegion() {
  document.getElementById('kimiRegionGroup').classList.toggle('hidden', currentAPI !== 'kimi');
}

// ==================== 儲存 & 更新 ====================
function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) return alert('請輸入 API Key');
  localStorage.setItem(`apiKey_${currentAPI}`, key);
  alert('✅ Key 已儲存！');
}

function updateCurrentAPI() {
  let text = `${API_CONFIGS[currentAPI].name} 已啟用`;
  if (currentAPI === 'kimi') text += ` (.${kimiRegion})`;
  document.getElementById('currentAPI').innerHTML = text;
}

// ==================== 聊天渲染 ====================
function renderMessages() {
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = `flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} message`;
    div.innerHTML = `
      <div class="${msg.role === 'user' ? 'bg-emerald-600 text-white' : 'bg-gray-800'} px-5 py-4 rounded-3xl rounded-tr-none">
        <div class="text-sm opacity-75 mb-1">${msg.role === 'user' ? '你' : API_CONFIGS[currentAPI].name}</div>
        <div class="whitespace-pre-wrap">${msg.content}</div>
      </div>
    `;
    chat.appendChild(div);
  });
  chat.scrollTop = chat.scrollHeight;
}

// ==================== 送出訊息（已修正 baseURL + 加強錯誤） ====================
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  messages.push({ role: 'user', content: text });
  renderMessages();
  input.value = '';

  const key = localStorage.getItem(`apiKey_${currentAPI}`);
  if (!key) return alert('請先儲存 API Key');

  const chat = document.getElementById('chat');
  const assistantDiv = document.createElement('div');
  assistantDiv.className = 'flex justify-start message';
  assistantDiv.innerHTML = `
    <div class="bg-gray-800 px-5 py-4 rounded-3xl rounded-tl-none w-full">
      <div class="text-sm opacity-75 mb-1">${API_CONFIGS[currentAPI].name} 思考中...</div>
      <div id="streamingText" class="whitespace-pre-wrap text-emerald-400"></div>
    </div>
  `;
  chat.appendChild(assistantDiv);
  chat.scrollTop = chat.scrollHeight;

  const streamingText = document.getElementById('streamingText');
  let fullResponse = '';

  try {
    isStreaming = true;

    let config = {...API_CONFIGS[currentAPI]};
    if (currentAPI === 'kimi') {
      config.baseURL = kimiRegion === 'ai' 
        ? 'https://api.moonshot.ai/v1' 
        : 'https://api.moonshot.cn/v1';   // 你註冊的 .cn 已預設
    }

    const response = await fetch(config.baseURL + config.endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`
      },
      body: JSON.stringify({
        model: config.model,
        messages: messages,
        stream: true
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`HTTP ${response.status} - ${errText.slice(0, 200)}`);
    }

    // streaming 處理
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ') && !line.includes('[DONE]')) {
          try {
            const data = JSON.parse(line.slice(6));
            const delta = data.choices[0]?.delta?.content || '';
            fullResponse += delta;
            streamingText.textContent = fullResponse;
            chat.scrollTop = chat.scrollHeight;
          } catch(e) {}
        }
      }
    }

    messages.push({ role: 'assistant', content: fullResponse });
    localStorage.setItem('chatMessages', JSON.stringify(messages));
    renderMessages();

  } catch (err) {
    let msg = err.message;
    if (msg.includes('Failed to fetch')) {
      msg = '❌ Failed to fetch<br><span class="text-xs">這是 CORS 問題：Kimi 官方不允許 GitHub Pages 直接呼叫<br>解決方案：我下一版幫你加 Cloudflare Worker 中轉（2 分鐘搞定）</span>';
    }
    streamingText.innerHTML = `<span class="text-red-400">${msg}</span>`;
  } finally {
    isStreaming = false;
  }
}

function clearChat() { /* 同之前 */ 
  if (confirm('確定清空？')) {
    messages = [];
    localStorage.removeItem('chatMessages');
    renderMessages();
  }
}

function exportChat() { /* 同之前 */ 
  if (messages.length === 0) return alert('沒有對話');
  const json = JSON.stringify(messages, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `llm-chat-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

// ==================== 事件 ====================
document.getElementById('apiSelect').addEventListener('change', e => {
  currentAPI = e.target.value;
  localStorage.setItem('currentAPI', currentAPI);
  updateCurrentAPI();
  toggleKimiRegion();
  const savedKey = localStorage.getItem(`apiKey_${currentAPI}`);
  document.getElementById('apiKey').value = savedKey || '';
});

document.getElementById('kimiRegion').addEventListener('change', e => {
  kimiRegion = e.target.value;
  localStorage.setItem('kimiRegion', kimiRegion);
  updateCurrentAPI();
});

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

loadSettings();
</script>
</html>
